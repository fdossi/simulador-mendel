name: Gerar aplicativo Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'main.js'
      - 'package.json'
      - '.github/workflows/build-windows.yml'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Gerar instalador e versão portátil
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Publicar executáveis como artefato
        uses: actions/upload-artifact@v4
        with:
          name: simulador-mendel-windows
          path: |
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 30
